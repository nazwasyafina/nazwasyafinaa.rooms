<!DOCTYPE html> 
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - Nazwa’s Library Corner</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:60px 20px;
color:#4b3621;

/* background lebih terang dominan putih */
background:
radial-gradient(circle at 20% 20%, rgba(255,255,255,0.9), transparent 45%),
radial-gradient(circle at 80% 70%, rgba(255,255,255,0.7), transparent 45%),
linear-gradient(135deg,#ffffff,#f6f2ee,#eadfce);
}

/* decorative glass shapes */

body::before{
content:"";
position:fixed;
width:350px;
height:350px;
border-radius:50%;
background:rgba(255,255,255,0.45);
backdrop-filter:blur(20px);
top:-120px;
left:-120px;
}

body::after{
content:"";
position:fixed;
width:300px;
height:300px;
border-radius:50%;
background:rgba(255,255,255,0.35);
backdrop-filter:blur(20px);
bottom:-120px;
right:-120px;
}

/* full screen layout */

.contact-container{
max-width:600px;
width:100%;
text-align:center;
}

/* title */

.contact-container h2{
font-size:34px;
font-weight:700;
margin-bottom:15px;
color:#4b3621;
}

/* description */

.contact-container p{
font-size:14px;
line-height:1.7;
margin-bottom:30px;
color:#4b3621;
}

/* form */

form{
display:flex;
flex-direction:column;
gap:18px;
}

/* input group */

.input-group{
text-align:left;
}

.input-group label{
display:block;
font-size:14px;
margin-bottom:6px;
font-weight:500;
}

/* modern inputs */

.input-group input,
.input-group textarea{
width:100%;
padding:13px 15px;
border-radius:12px;
border:1px solid rgba(0,0,0,0.08);
background:rgba(255,255,255,0.85);
font-size:14px;
font-family:'Poppins',sans-serif;
outline:none;
transition:0.3s;
}

.input-group input:focus,
.input-group textarea:focus{
border-color:#8b6b4f;
box-shadow:0 0 0 3px rgba(139,107,79,0.15);
}

.input-group textarea{
resize:none;
height:110px;
}

/* button */

button{
margin-top:5px;
padding:13px;
border:none;
border-radius:30px;
background:#8b6b4f;
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#6e533c;
transform:translateY(-2px);
}

/* success message */

.success-message{
margin-top:15px;
text-align:center;
color:#2f6f3e;
font-size:14px;
}

</style>
</head>

<body>

<div class="contact-container">
  <h2>Contact Us</h2>

  <p>
    Punya pertanyaan, kritik, atau saran untuk Nazwa’s Library Corner? 
    Silahkan kirimkan pesanmu melalui formulir di bawah ini. 
  </p>

  <form id="contactForm">
    <div class="input-group">
      <label>Nama</label>
      <input type="text" id="nama" placeholder="Masukkan nama lengkap kamu" required>
    </div>

    <div class="input-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="Masukkan email aktif kamu" required>
    </div>

    <div class="input-group">
      <label>Pesan (Pertanyaan / Kritik / Saran)</label>
      <textarea id="pesan" placeholder="Tulis pertanyaan, kritik, atau saran kamu di sini..." required></textarea>
    </div>

    <button type="submit">Kirim Pesan</button>
  </form>

  <p style="text-align:center; font-size:12px; margin-top:15px;">
    Semua pesan yang masuk akan dibaca dan dihargai 🤎
  </p>

  <div class="success-message" id="successMsg"></div>
</div>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e){
  e.preventDefault();

  const nama = document.getElementById("nama").value;
  const email = document.getElementById("email").value;
  const pesan = document.getElementById("pesan").value;

  console.log("Nama:", nama);
  console.log("Email:", email);
  console.log("Pesan:", pesan);

  document.getElementById("successMsg").innerText = 
    "Terima kasih atas feedback Anda ❤️";

  document.getElementById("contactForm").reset();
});
</script>

</body>
</html>
